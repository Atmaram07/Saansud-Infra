  <main>
    <!--Page title-->
    <div class="page-title" style="background-image: url(assets/images/get-a-quote-banner.jpg);">
      <div class="container">
        <div class="row">
          <div class="col-12 text-center">
            <span class="subtitle">Contact Us </span>
            <h1>Contact Us Form</h1>
          </div>
        </div>
      </div>
      <span class="circle-top"></span>
    </div>
    <!--./Page title-->


    <!--Get a Quote-->
    <div class="quote-form-section pad-top-lg pad-bottom-md">
      <div class="container">
        <div class="row">
          <div class="col-lg-12 text-center">
            <div class="sec-title text-center mb-6">
              <span class="subtitle">Get A Free Estimate Now</span> <br>
              <h2>Get a Quote</h2>
              <p>
                Please Feel Free To Share With Us The Details As ​mentioned In The Form. We Will Reach Out To ​you Within 24 Hours.
              </p>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="form-wrapper">
              <div class="alert alert-success mb-4" role="alert" id="response"></div>
              <div class="alert alert-danger mb-4" role="alert" id="response-error"></div>
              <form action="#" method="post" id="quoteForm">
                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <input name="firstName" type="text" class="form-control" placeholder="First Name" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <input name="lastName" type="text" class="form-control" placeholder="Last Name" required>
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <input name="email" type="email" class="form-control" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                  <input name="phone" type="text" class="form-control" placeholder="Phone Number" required>
                </div>
                <div class="form-group">
                  <input name="location" type="text" class="form-control" placeholder="Location" required>
                </div>
                <div class="form-group">
                  <button type="submit" class="btn btn-primary w-100">Get A Free Estimate Now</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div><!--./container-->
    </div>
    <!--./Get a Quote-->

  </main>



  <!--Footer-->
  <include src="footer.html"></include>

  <script>
    document.querySelectorAll("include").forEach(async (el) => {
      let file = el.getAttribute("src");
      let resp = await fetch(file);
      let html = await resp.text();
      el.outerHTML = html;
    });
  </script>
